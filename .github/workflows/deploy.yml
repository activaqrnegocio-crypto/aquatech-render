name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker Image (GitHub Runners)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Cache Docker layers to speed up subsequent builds (~2x faster on 2nd push)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Cache layers between runs using GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDTIME=${{ github.run_id }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=BLSZBPzs10qOLxh4miqlss8CuAL-VmzTR8xEbOImfojxNJGcqIy9PR4qQwZg6qxvWPKPabCMguhCf-2Y97fNk-k
            NEXTAUTH_URL=https://178.238.238.158.sslip.io/

  deploy:
    name: Deploy to VPS (Pull & Restart)
    runs-on: ubuntu-latest
    needs: build-and-push  # Only runs AFTER image is built and pushed

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 5m
          script: |
            # Log in to GHCR to pull private image
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u activaqrnegocio-crypto --password-stdin
            # Pull the pre-built image (fast — no compilation on VPS)
            docker pull ghcr.io/activaqrnegocio-crypto/aquatech-render:latest
            cd /root/aquatech-render
            # Restart using the pre-built image
            docker compose up -d
            # Clean up old dangling images
            docker image prune -f
