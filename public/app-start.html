<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquatech CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0f1e;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loader {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .offline-msg { display: none; margin-top: 20px; }
    .offline-msg.show { display: block; }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 14px 32px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }
    .status { color: #94a3b8; font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Cargando...</h2>
    <p class="status" id="status">Conectando al servidor</p>
    
    <div class="offline-msg" id="offlineMsg">
      <p style="color:#f59e0b; margin-bottom: 16px;">⚠️ No se pudo conectar al servidor</p>
      <button class="btn" onclick="tryLoad()">🔄 Reintentar</button>
      <br>
      <a class="btn" href="/admin" style="margin-top:8px; background:#1e293b;">🏠 Ir al CRM</a>
    </div>
  </div>

  <script>
    // Register SW immediately
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/custom-sw.js', { scope: '/' })
        .then(function(reg) { console.log('[Start] SW registered'); })
        .catch(function(e) { console.warn('[Start] SW failed:', e); });
    }

    function tryLoad() {
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('title').textContent = 'Cargando...';
      document.getElementById('status').textContent = 'Conectando al servidor';
      document.getElementById('offlineMsg').classList.remove('show');
      
      // Try to navigate to the actual app
      var timeout = setTimeout(function() {
        showOffline();
      }, 5000);

      fetch('/admin', { credentials: 'same-origin', redirect: 'follow' })
        .then(function(r) {
          clearTimeout(timeout);
          if (r.ok) {
            window.location.href = '/admin';
          } else {
            showOffline();
          }
        })
        .catch(function() {
          clearTimeout(timeout);
          // Try going anyway - the SW might serve it from cache
          window.location.href = '/admin';
        });
    }

    function showOffline() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = 'Sin conexión';
      document.getElementById('status').textContent = '';
      document.getElementById('offlineMsg').classList.add('show');
    }

    // Auto-load on start
    tryLoad();
  </script>
</body>
</html>
